app = "social-studio"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  PLAYWRIGHT_BROWSERS_PATH = "0"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1024
    soft_limit = 512

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/brands"
    protocol = "http"
    timeout = "5s"
    tls_skip_verify = false

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "social_studio_data"
  destination = "/app/workspace"
  initial_size = "3gb"

[[statics]]
  guest_path = "/app/public"
  url_prefix = "/"
