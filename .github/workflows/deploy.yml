name: Build & Deploy to Fly.io

on:
  push:
    branches:
      - main
      - ai_main_*
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm run typecheck
      
      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/ai_main_'))
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "App: social-studio.fly.dev"
          echo "View logs: https://fly.io/dashboard/social-studio"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/ai_main_'))
    
    steps:
      - name: Wait for deployment
        run: sleep 10
      
      - name: Check API health
        run: |
          for i in {1..30}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://social-studio.fly.dev/api/brands)
            if [ "$response" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Status $response, retrying..."
            sleep 2
          done
          echo "❌ Health check failed"
          exit 1
